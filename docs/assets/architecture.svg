<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">TinyC compiler architecture</title>
  <desc id="desc">TinyC source passes through a Lex scanner and Yacc parser into an abstract syntax tree and symbol table, then independent project snapshots emit three-address intermediate code or MIPS SPIM target code.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#a75b42"/></marker>
    <style>.h{font:700 19px 'Segoe UI',Arial,sans-serif;fill:#29251f}.s{font:14px 'Segoe UI',Arial,sans-serif;fill:#675f53}.m{font:13px Consolas,monospace;fill:#a75b42}.box{fill:#fffdf8;stroke:#bcb29f;stroke-width:2}.flow{fill:none;stroke:#a75b42;stroke-width:4;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="720" fill="#f4f0e6"/>
  <text x="68" y="78" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#29251f">Two compiler snapshots, one conceptual front end</text>
  <text x="68" y="111" class="s">Each directory builds independently from its own scanner, parser, AST, and symbol-table sources.</text>

  <g transform="translate(62 246)">
    <rect width="190" height="180" rx="20" fill="#29251f"/>
    <text x="25" y="42" font-family="Consolas,monospace" font-size="13" fill="#d2aa58">INPUT</text>
    <text x="25" y="84" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="700" fill="#f4f0e6">TinyC source</text>
    <text x="25" y="118" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#d6cec0">declarations · expressions</text>
    <text x="25" y="145" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#d6cec0">if/else · print · return</text>
  </g>
  <g transform="translate(322 246)">
    <rect class="box" width="190" height="180" rx="20"/>
    <text x="25" y="42" class="m">LEXICAL</text><text x="25" y="84" class="h">Lex scanner</text>
    <text x="25" y="118" class="s">tiny.l</text><text x="25" y="145" class="s">tokens + values</text>
  </g>
  <g transform="translate(582 246)">
    <rect class="box" width="190" height="180" rx="20"/>
    <text x="25" y="42" class="m">SYNTAX</text><text x="25" y="84" class="h">Yacc parser</text>
    <text x="25" y="118" class="s">tiny.y</text><text x="25" y="145" class="s">grammar actions</text>
  </g>
  <g transform="translate(842 214)">
    <rect class="box" width="220" height="244" rx="20"/>
    <text x="25" y="42" class="m">SEMANTIC MODEL</text><text x="25" y="84" class="h">AST + symbols</text>
    <text x="25" y="120" class="s">ast.*</text><text x="25" y="148" class="s">program.* / Function.*</text>
    <text x="25" y="176" class="s">symboltable.*</text>
    <path d="M30 205h160" stroke="#d2aa58" stroke-width="5"/>
  </g>
  <path class="flow" d="M252 336h70M512 336h70M772 336h70"/>

  <path class="flow" d="M1062 286h74v-88h34"/>
  <path class="flow" d="M1062 385h74v105h34"/>
  <g transform="translate(1170 128)">
    <rect width="184" height="174" rx="20" fill="#fff7df" stroke="#d2aa58" stroke-width="2"/>
    <text x="22" y="38" class="m">SNAPSHOT A</text>
    <text x="22" y="78" class="h">Three-address IR</text>
    <text x="22" y="112" class="s">IntermediateCode.*</text>
    <text x="22" y="140" class="m">test.tc.ic</text>
  </g>
  <g transform="translate(1170 420)">
    <rect width="184" height="174" rx="20" fill="#29251f"/>
    <text x="22" y="38" font-family="Consolas,monospace" font-size="13" fill="#d2aa58">SNAPSHOT B</text>
    <text x="22" y="78" font-family="Segoe UI,Arial,sans-serif" font-size="19" font-weight="700" fill="#f4f0e6">MIPS / SPIM</text>
    <text x="22" y="112" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#d6cec0">Register + codegen</text>
    <text x="22" y="140" font-family="Consolas,monospace" font-size="13" fill="#d2aa58">test.tc.spim</text>
  </g>

  <rect x="62" y="544" width="1000" height="88" rx="17" fill="#fffdf8" stroke="#d2aa58" stroke-width="2"/>
  <text x="91" y="580" class="h">Not evidenced as a separate phase</text>
  <text x="91" y="609" class="s">No standalone optimizer is present; the diagram does not claim code optimization.</text>
</svg>
